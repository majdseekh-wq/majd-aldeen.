<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجد الدين | حلويات شامية أصيلة</title>
<meta name="description" content="حلويات شامية تقليدية صنعت بحب — اطلب الآن واستلم من المحل أو وصلها لباب بيتك">
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== الشريط العلوي ===== -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="images/logo.png" alt="مجد الدين - حلويات شامية أصيلة" class="brand-logo">
    </div>
    <button class="cart-trigger" id="cartTrigger" aria-label="فتح السلة">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 6h2l2.4 12.2a2 2 0 0 0 2 1.6h8.6a2 2 0 0 0 2-1.6L22 8H6"/>
        <circle cx="9" cy="21" r="1.3" fill="currentColor"/>
        <circle cx="18" cy="21" r="1.3" fill="currentColor"/>
      </svg>
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<!-- ===== البطل ===== -->
<section class="hero">
  <div class="hero-pattern" aria-hidden="true"></div>
  <div class="hero-inner">
    <p class="hero-eyebrow">منذ المطبخ الشامي إلى مائدتك</p>
    <h1 class="hero-title">حلاوة الشام،<br>بين يديك اليوم</h1>
    <p class="hero-text">كل صنف بيتحضّر طازج، بنفس وصفات الجدّات، وبيوصلك لباب البيت أو جاهز لاستلامك من المحل.</p>
    <a href="#menu" class="btn btn-primary">شوف القائمة</a>
  </div>
</section>

<!-- ===== شرائط الفئات ===== -->
<nav class="category-nav" id="categoryNav" aria-label="فئات المنتجات"></nav>

<!-- ===== القائمة ===== -->
<main id="menu" class="menu-section">
  <div id="categoriesContainer"></div>
</main>

<!-- ===== تذييل ===== -->
<footer class="site-footer">
  <img src="images/logo.png" alt="مجد الدين" class="footer-logo">
  <p class="footer-text">حلويات شامية أصيلة — الخبر، المملكة العربية السعودية</p>
</footer>

<!-- ===== زر السلة العائم (موبايل) ===== -->
<button class="fab-cart" id="fabCart" aria-label="عرض السلة">
  <span id="fabCartText">السلة فاضية</span>
</button>

<!-- ===== لوحة السلة المنزلقة ===== -->
<div class="cart-overlay" id="cartOverlay"></div>
<aside class="cart-drawer" id="cartDrawer" aria-label="سلة الطلبات">
  <div class="cart-header">
    <h2>سلتك</h2>
    <button class="cart-close" id="cartClose" aria-label="إغلاق">✕</button>
  </div>

  <div class="cart-body" id="cartBody">
    <!-- يتم تعبئتها بالـ JS -->
  </div>

  <div class="cart-footer" id="cartFooter">
    <div class="cart-total-row">
      <span>الإجمالي</span>
      <span id="cartTotal">0 ريال</span>
    </div>
    <button class="btn btn-primary btn-full" id="goToCheckout">إتمام الطلب</button>
  </div>
</aside>

<!-- ===== لوحة إتمام الطلب ===== -->
<div class="cart-overlay" id="checkoutOverlay"></div>
<aside class="cart-drawer checkout-drawer" id="checkoutDrawer" aria-label="إتمام الطلب">
  <div class="cart-header">
    <h2>بيانات الطلب</h2>
    <button class="cart-close" id="checkoutClose" aria-label="إغلاق">✕</button>
  </div>

  <form class="checkout-form" id="checkoutForm">
    <div class="form-group">
      <label for="custName">الاسم</label>
      <input type="text" id="custName" required placeholder="اسمك الكامل">
    </div>

    <div class="form-group">
      <label for="custPhone">رقم الجوال</label>
      <input type="tel" id="custPhone" required placeholder="05XXXXXXXX" pattern="[0-9+\s]{8,15}">
    </div>

    <div class="form-group">
      <label>طريقة الاستلام</label>
      <div class="toggle-group">
        <button type="button" class="toggle-btn active" data-method="pickup">استلام من المحل</button>
        <button type="button" class="toggle-btn" data-method="delivery">توصيل</button>
      </div>
    </div>

    <div class="form-group" id="addressGroup" style="display:none;">
      <label for="custAddress">العنوان بالتفصيل</label>
      <textarea id="custAddress" placeholder="الحي، الشارع، أقرب معلم..." rows="2"></textarea>
    </div>

    <div class="form-group">
      <label for="custNotes">ملاحظات (اختياري)</label>
      <textarea id="custNotes" placeholder="أي طلب خاص أو موعد تفضله..." rows="2"></textarea>
    </div>

    <div class="order-summary" id="orderSummary"></div>

    <button type="submit" class="btn btn-whatsapp btn-full">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.93.56 3.73 1.5 5.27L2 22l4.96-1.6a9.8 9.8 0 0 0 5.08 1.4c5.46 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2zm5.78 14.06c-.24.68-1.4 1.3-1.93 1.38-.49.08-1.12.11-1.81-.11-.42-.13-.95-.31-1.64-.61-2.89-1.25-4.78-4.15-4.92-4.34-.14-.19-1.18-1.57-1.18-3 0-1.42.74-2.12 1-2.41.26-.29.57-.36.76-.36.19 0 .38 0 .55.01.18.01.41-.07.64.49.24.58.81 2 .88 2.15.07.15.12.33.02.52-.1.19-.15.31-.3.48-.15.17-.31.38-.44.51-.15.15-.3.31-.13.6.17.29.76 1.25 1.63 2.03 1.12 1 2.06 1.31 2.36 1.46.3.15.48.13.65-.05.21-.23.65-.76.83-1.02.18-.26.36-.21.6-.13.24.08 1.55.73 1.81.86.27.13.45.19.51.3.07.12.07.66-.17 1.34z"/></svg>
      إرسال الطلب على واتساب
    </button>
  </form>
</aside>

<!-- ===== رسالة التأكيد ===== -->
<div class="toast" id="toast"></div>

<!-- نموذج إيميل خفي (يرسل تلقائياً بالخلفية بدون أي تدخل من العميل) -->
<form id="emailBackupForm" style="display:none;"></form>

<script src="app.js"></script>
</body>
</html>
